<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voltair Marine — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      overflow: hidden;
      position: relative;
      background-color: #3a4d63;
    }

    /* ---------- Background ---------- */
    .bg {
      position: fixed;
      inset: 0;
      background-color: #3c5069;
      background:
        radial-gradient(ellipse 70% 70% at 6% 6%,    #28384a 0%, transparent 55%),
        radial-gradient(ellipse 90% 80% at 96% 96%,  #2a3a4d 0%, transparent 60%),
        linear-gradient(125deg, #34465b 0%, #415672 48%, #45597200 60%, #3b4f66 100%);
    }

    /* Everything diagonal shares this tilt: "/" = bottom-left -> top-right */
    .diag { position: fixed; inset: 0; overflow: hidden; pointer-events: none; }

    .band {
      position: absolute;
      top: -60%;
      height: 220%;
      transform: rotate(45deg);
      transform-origin: center;
    }

    /* Wide soft light slash through the centre */
    .band-wide {
      left: 30%;
      width: 30vmax;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(150, 188, 220, 0.10) 25%,
        rgba(178, 210, 236, 0.30) 50%,
        rgba(150, 188, 220, 0.10) 75%,
        transparent 100%);
      filter: blur(2px);
    }

    /* Soft bright fold line (subtle, not a harsh stripe) */
    .band-edge {
      left: 45%;
      width: 8px;
      background: linear-gradient(to bottom,
        transparent, rgba(198, 222, 246, 0.28) 30%, rgba(198, 222, 246, 0.28) 70%, transparent);
      filter: blur(2px);
    }

    /* Dark fold next to the bright edge (the metal crease) */
    .band-shadow {
      left: 41%;
      width: 26px;
      background: linear-gradient(to right,
        transparent, rgba(20, 30, 42, 0.28) 50%, transparent);
      filter: blur(3px);
    }

    /* Sharp bright "sail" shard near top-centre */
    .shard {
      position: absolute;
      top: -10%;
      left: 54%;
      width: 24%;
      height: 66%;
      background: linear-gradient(110deg,
        rgba(120, 158, 190, 0) 30%,
        rgba(180, 212, 238, 0.34) 58%,
        rgba(210, 232, 252, 0.5) 66%,
        rgba(120, 158, 190, 0) 68%);
      clip-path: polygon(52% 0%, 64% 5%, 20% 100%, 10% 84%);
      filter: blur(1.2px);
    }

    /* Thin scratch marks, all parallel to the slash */
    .scratch {
      position: absolute;
      transform: rotate(45deg);
      background: rgba(212, 232, 250, 0.22);
      border-radius: 2px;
    }
    .sc1 { width: 1.5px; height: 120px; top: 10%; left: 30%; }
    .sc2 { width: 1px;   height: 70px;  top: 20%; left: 36%; }
    .sc3 { width: 1px;   height: 230px; top: 6%;  left: 64%; opacity: .8; }
    .sc4 { width: 1.5px; height: 90px;  top: 60%; left: 14%; }
    .sc5 { width: 1px;   height: 60px;  top: 74%; left: 70%; opacity: .6; }
    .sc6 { width: 1px;   height: 150px; top: 40%; left: 86%; opacity: .7; }
    .sc7 { width: 1px;   height: 80px;  top: 78%; left: 52%; opacity: .45; }
    .sc8 { width: 1px;   height: 110px; top: 30%; left: 8%;  opacity: .5; }

    /* ---------- Content ---------- */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      color: #fff;
      padding: 24px 20px;
      width: 100%;
      max-width: 720px;
      user-select: none;
    }

    .logo {
      height: clamp(120px, 22vh, 196px);
      width: auto;
      margin: 0 auto clamp(18px, 3vh, 30px);
      display: block;
      filter: drop-shadow(0 3px 14px rgba(0, 0, 0, 0.28));
    }

    .brand-name {
      font-size: clamp(46px, 11.5vw, 92px);
      font-weight: 700;
      letter-spacing: 0.2em;
      line-height: 1;
      text-indent: 0.2em;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.22);
    }

    .divider {
      height: 2px;
      background: rgba(255, 255, 255, 0.9);
      margin: 12px auto 9px;
      border-radius: 2px;
    }

    .brand-sub {
      font-size: clamp(14px, 3vw, 24px);
      font-weight: 300;
      letter-spacing: 0.62em;
      text-indent: 0.62em;
      opacity: 0.95;
    }

    .coming-soon {
      margin-top: clamp(38px, 7vh, 90px);
      font-size: clamp(38px, 9vw, 78px);
      font-weight: 300;
      letter-spacing: 0.01em;
      color: rgba(150, 188, 218, 0.5);
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="diag">
    <div class="band band-shadow"></div>
    <div class="band band-wide"></div>
    <div class="band band-edge"></div>
    <div class="shard"></div>
    <div class="scratch sc1"></div>
    <div class="scratch sc2"></div>
    <div class="scratch sc3"></div>
    <div class="scratch sc4"></div>
    <div class="scratch sc5"></div>
    <div class="scratch sc6"></div>
    <div class="scratch sc7"></div>
    <div class="scratch sc8"></div>
  </div>

  <div class="content">
    <!-- Foiling emblem: forked-nose board with two thin wings sweeping up & out -->
    <svg class="logo" viewBox="0 0 160 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="board" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0"   stop-color="#dde6ee"/>
          <stop offset="0.45" stop-color="#ffffff"/>
          <stop offset="1"   stop-color="#eef3f8"/>
        </linearGradient>
      </defs>

      <!-- Thin needle wings, tapering to a point, sweeping up & outward -->
      <path d="M80 232 L10 120 L20 122 L80 240 Z"  fill="#eef3f8"/>
      <path d="M80 232 L150 120 L140 122 L80 240 Z" fill="#eef3f8"/>

      <!-- Small dorsal fin at the very nose -->
      <path d="M80 8 C84 18, 86 26, 80 34 C74 26, 76 18, 80 8 Z" fill="url(#board)"/>

      <!-- Board body: pointed nose & tail, wide middle -->
      <path d="M80 30
               C98 62, 110 112, 110 168
               C110 226, 96 264, 80 286
               C64 264, 50 226, 50 168
               C50 112, 62 62, 80 30 Z"
            fill="url(#board)"/>

      <!-- Forked-nose inlay: slim leaf in the upper third -->
      <path d="M80 46 C71 74, 71 104, 80 126 C89 104, 89 74, 80 46 Z"
            fill="none" stroke="rgba(70,92,118,0.45)" stroke-width="2.4"/>
      <!-- Centre stringer -->
      <line x1="80" y1="126" x2="80" y2="262" stroke="rgba(70,92,118,0.40)" stroke-width="2.2"/>
    </svg>

    <div class="brand-name">VOLTAIR</div>
    <div class="divider"></div>
    <div class="brand-sub">MARINE</div>
    <div class="coming-soon">Coming Soon...</div>
  </div>
</body>
</html>
