<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voltair Marine — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      overflow: hidden;
      position: relative;
      background-color: #47607a;
    }

    /* Base gradient - darker bottom-left, lighter top-right */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 70%, #2c3e55 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 85% 25%, #5e7d9a 0%, transparent 65%),
        linear-gradient(140deg, #3b4f68 0%, #4e677f 45%, #526b82 100%);
    }

    /* Diagonal bands overlay */
    .bands {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .band {
      position: absolute;
      transform: rotate(-42deg);
      transform-origin: center center;
      top: -100%;
      height: 300%;
    }

    .band-1 {
      left: 32%;
      width: 220px;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(140, 185, 220, 0.12) 20%,
        rgba(160, 205, 235, 0.22) 50%,
        rgba(140, 185, 220, 0.12) 80%,
        transparent 100%
      );
    }

    .band-2 {
      left: 47%;
      width: 80px;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(185, 220, 245, 0.28) 40%,
        rgba(185, 220, 245, 0.28) 60%,
        transparent 100%
      );
    }

    /* Thin scratch marks */
    .scratch {
      position: absolute;
      transform: rotate(-42deg);
      background: rgba(210, 230, 248, 0.22);
    }

    .sc1 { width: 1.5px; height: 130px; top: 8%; left: 22%; }
    .sc2 { width: 1px;   height: 80px;  top: 18%; left: 28%; }
    .sc3 { width: 1px;   height: 220px; top: 3%;  left: 68%; }
    .sc4 { width: 1.5px; height: 90px;  top: 62%; left: 18%; }
    .sc5 { width: 1px;   height: 55px;  top: 72%; left: 78%; }
    .sc6 { width: 1px;   height: 160px; top: 35%; left: 88%; }
    .sc7 { width: 1px;   height: 70px;  top: 50%; left: 55%; opacity: 0.5; }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      color: white;
      padding: 24px 20px;
      width: 100%;
      max-width: 640px;
      user-select: none;
    }

    .logo {
      width: clamp(90px, 14vw, 140px);
      height: auto;
      margin: 0 auto clamp(18px, 3.5vh, 32px);
      display: block;
      filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.25));
    }

    .brand-name {
      font-size: clamp(42px, 11vw, 84px);
      font-weight: 700;
      letter-spacing: 0.22em;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.18);
    }

    .divider {
      height: 1.5px;
      background: rgba(255, 255, 255, 0.88);
      margin: 10px 0 8px;
      border-radius: 1px;
    }

    .brand-sub {
      font-size: clamp(13px, 2.8vw, 22px);
      font-weight: 300;
      letter-spacing: 0.6em;
      text-indent: 0.6em;
      opacity: 0.95;
    }

    .coming-soon {
      margin-top: clamp(30px, 5.5vh, 65px);
      font-size: clamp(30px, 7.5vw, 62px);
      font-weight: 300;
      letter-spacing: 0.02em;
      color: rgba(155, 192, 220, 0.46);
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="bands">
    <div class="band band-1"></div>
    <div class="band band-2"></div>
    <div class="scratch sc1"></div>
    <div class="scratch sc2"></div>
    <div class="scratch sc3"></div>
    <div class="scratch sc4"></div>
    <div class="scratch sc5"></div>
    <div class="scratch sc6"></div>
    <div class="scratch sc7"></div>
  </div>

  <div class="content">
    <!-- Logo: foil/hull shape with wing lines — stylised foiling sailboat silhouette -->
    <svg class="logo" viewBox="0 0 130 105" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
      <!-- Left wing -->
      <line x1="65" y1="68" x2="5"   y2="100" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
      <!-- Right wing -->
      <line x1="65" y1="68" x2="125" y2="100" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
      <!-- Central foil — elongated almond / surfboard shape -->
      <path d="M65 6
               C70 6, 77 18, 77 40
               C77 62, 70 76, 65 80
               C60 76, 53 62, 53 40
               C53 18, 60 6, 65 6 Z"
            fill="white"/>
      <!-- Subtle highlight ridge on foil -->
      <path d="M62 12
               C63 12, 66 20, 66 38
               C66 54, 63 65, 62 68
               C60 65, 59 54, 59 38
               C59 20, 60 12, 62 12 Z"
            fill="rgba(210,230,248,0.55)"/>
    </svg>

    <div class="brand-name">VOLTAIR</div>
    <div class="divider"></div>
    <div class="brand-sub">MARINE</div>
    <div class="coming-soon">Coming Soon...</div>
  </div>
</body>
</html>
